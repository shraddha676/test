kind = "web"
previewPath = "/"
title = "Smart Safai Hub"
version = "1.0.0"
id = "artifacts/smart-safai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19793

[services.development]
run = "pnpm --filter @workspace/smart-safai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-safai", "run", "build" ]
publicDir = "artifacts/smart-safai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19793"
BASE_PATH = "/"
